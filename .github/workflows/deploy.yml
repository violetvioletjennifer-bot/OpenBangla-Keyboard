name: Build Lekhoni Keyboard

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Installer
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64
          cmake --build . --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lekhoni-Keyboard
          path: build          fi
      
      - name: checkout-source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: run-builder
        shell: bash
        run: ./tools/build.sh

      - name: Sanitize container name
        id: sanitizer
        shell: bash
        run: |
          # Replace colons and slashes with dashes
          SANITIZED_CONTAINER=$(echo "${{ matrix.container }}" | sed 's/[:\\/]/-/g')
          echo "sanitized_container=$SANITIZED_CONTAINER" >> $GITHUB_OUTPUT

      - name: upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ steps.sanitizer.outputs.sanitized_container }}
          path: artifact

  release:
    if: contains(github.event.head_commit.message, 'deploy+')
    needs: build
    runs-on: "ubuntu-latest"
    steps:
      - name: checkout-source
        uses: actions/checkout@v4

      - name: get-version
        id: get_version
        shell: bash
        run: |
          RELEASE_VERSION=$(cat version.txt | head -n1)
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_OUTPUT
    
      - name: download-artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: create-release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.get_version.outputs.RELEASE_VERSION }}
          name: ${{ steps.get_version.outputs.RELEASE_VERSION }}
          artifacts: "artifacts/*/*"
          allowUpdates: true
          draft: true
          body: |
            [![Github Releases (by Release)](https://img.shields.io/github/downloads/${{ github.repository }}/${{ steps.get_version.outputs.RELEASE_VERSION }}/total.svg)]()
            ### Changes in this release:
            - ...
